name: "Auto Update"
on:
  workflow_dispatch:
  schedule:
    - cron: "0/10 * * * *"
env:
  TZ: Asia/Shanghai

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization environment
        run: sudo timedatectl set-timezone "$TZ"

      - name: Get Code
        id: Gcode
        run: |
          git clone https://github.com/byJoey/cfnew /tmp/cfnew
          cd /tmp/cfnew
          hash=$(git describe --always | awk -F "-" '{print $3}')
          cp -rvf 明文源吗 ${GITHUB_WORKSPACE}/明文源码
          cp -rvf wrangler.toml ${GITHUB_WORKSPACE}/wrangler.toml
          echo "hash=${hash}" >> $GITHUB_OUTPUT

      - name: Get Latest
        id: Compare
        run: |
          Latest=$(curl -skL https://api.github.com/repos/hubbylei/cfnew/releases/latest | jq .tag_name | awk -F "-" '{print $2}')
          echo "Latest:${Latest}"
          if [ "${{ steps.Gcode.outputs.hash }}" = "${Latest}" ];then
            echo "update=false" >> "$GITHUB_OUTPUT"
          else
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.compare.outputs.update == 'true'
        uses: actions/setup-node@main
        with:
          node-version: '24'

      - name: Install Obfuscator
        if: steps.compare.outputs.update == 'true'
        run: npm install javascript-obfuscator

      - name: Obfuscate from local source file
        if: steps.compare.outputs.update == 'true'
        run: |
          cat > obfuscate.js << 'EOF'
          const JavaScriptObfuscator = require('javascript-obfuscator');
          const fs = require('fs');
          const path = require('path');
          
          const sourceFileName = '明文源码';
          const outputFileName = '_worker.js';
          const sourceFilePath = path.join(process.cwd(), sourceFileName);

          if (!fs.existsSync(sourceFilePath)) {
            console.error('错误：在路径 \'' + sourceFilePath + '\' 未找到源文件。请确保您的仓库根目录有名为 \'明文源吗\' 的文件。');
            process.exit(1);
          }

          const originalCode = fs.readFileSync(sourceFilePath, 'utf8');

          if (!originalCode || originalCode.trim().length === 0) {
            console.error('错误：源文件 ' + sourceFileName + ' 为空。');
            process.exit(1);
          }

          const obfuscationOptions = {
              compact: true,
              controlFlowFlattening: false,
              controlFlowFlatteningThreshold: 0,
              deadCodeInjection: false,
              stringArray: true,
              stringArrayEncoding: ['base64'],
              stringArrayThreshold: 1.0,
              stringArrayRotate: true,
              stringArrayShuffle: true,
              stringArrayWrappersCount: 2,
              stringArrayWrappersChainedCalls: false,
              stringArrayWrappersParametersMaxCount: 3,
              renameGlobals: true,
              identifierNamesGenerator: 'mangled-shuffled',
              identifierNamesCache: null,
              identifiersPrefix: '',
              renameProperties: false,
              renamePropertiesMode: 'safe',
              ignoreImports: false,
              target: 'browser',
              numbersToExpressions: false,
              simplify: false,
              splitStrings: true,
              splitStringsChunkLength: 1,
              transformObjectKeys: false,
              unicodeEscapeSequence: true,
              selfDefending: false,
              debugProtection: false,
              debugProtectionInterval: 0,
              disableConsoleOutput: false,
              domainLock: []
          };

          const obfuscatedCode = JavaScriptObfuscator.obfuscate(originalCode, obfuscationOptions).getObfuscatedCode();
          
          fs.writeFileSync(path.join(process.cwd(), outputFileName), obfuscatedCode, 'utf8');
          console.log('成功将 \'' + sourceFileName + '\' 混淆并保存至 \'' + outputFileName + '\'。');
          EOF
          node obfuscate.js

      - name: Clear
        if: steps.compare.outputs.update == 'true'
        run: rm -rf node_modules obfuscate.js package*

      - name: Creat Message
        if: steps.compare.outputs.update == 'true'
        id: msg
        run: echo "commit_message=Update $(date +"%Y-%m-%d %H:%M:%S")" >> "$GITHUB_OUTPUT"
 
      - name: Apply Changes
        if: steps.compare.outputs.update == 'true'
        id: commit
        uses: stefanzweifel/git-auto-commit-action@master
        with:
         commit_message: ${{ steps.msg.outputs.commit_message }}
         branch: main

      - name: Generate ZIP
        id: zip
        if: steps.commit.outputs.changes_detected == 'true'
        run: |
          ver=$(cat ${GITHUB_WORKSPACE}/明文源码 | grep "版本:" | sed 's,.*\(v[0-9]\+.[0-9]\+.[0-9]\+[a-zA-Z]\).*,\1,')
          zip Pages${ver}-${{ steps.Gcode.outputs.hash }}.zip _worker.js
          echo "ver=${ver}" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Publish Release
        if: steps.zip.outputs.status == 'success'
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ steps.zip.outputs.ver }}-${{ steps.Gcode.outputs.hash }}
          body: ${{ steps.msg.outputs.commit_message }}
          files: Pages${{ steps.zip.outputs.ver }}-${{ steps.Gcode.outputs.hash }}.zip

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 5
